name: Generate Blog Post

on:
  # Run every Monday at 9am UTC
  schedule:
    - cron: '0 9 * * 1'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      slug:
        description: 'Specific topic slug from topic-queue.json (leave blank for next in queue)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Generate blog post
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.slug }}" ]; then
            node scripts/generate-article.js --slug "${{ github.event.inputs.slug }}"
          else
            node scripts/generate-article.js
          fi

      - name: Get post info for PR title
        id: post_info
        run: |
          SLUG=$(node -e "const q=JSON.parse(require('fs').readFileSync('scripts/topic-queue.json','utf8')); const p=q.filter(t=>t.published).pop(); console.log(p.slug)")
          TITLE=$(node -e "const q=JSON.parse(require('fs').readFileSync('scripts/topic-queue.json','utf8')); const p=q.filter(t=>t.published).pop(); console.log(p.title)")
          DATE=$(node -e "console.log(new Date().toISOString().split('T')[0])")
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat(blog): add post — ${{ steps.post_info.outputs.title }}"
          branch: "blog/auto-${{ steps.post_info.outputs.slug }}"
          delete-branch: true
          title: "📝 New post: ${{ steps.post_info.outputs.title }}"
          body: |
            ## Auto-generated blog post

            **Title:** ${{ steps.post_info.outputs.title }}
            **Date:** ${{ steps.post_info.outputs.date }}
            **Preview:** https://campaignly-help-git-blog-auto-${{ steps.post_info.outputs.slug }}.vercel.app/blog/${{ steps.post_info.outputs.slug }}

            ---

            Review the post, edit directly in this PR if needed, then merge to publish.
            Merging to `main` triggers an automatic Vercel deploy to `help.campaignly.net`.

            _Generated by GitHub Actions using Claude Opus 4.6_
          labels: blog-post

      - name: Post to Slack for approval
        if: steps.create_pr.outputs.pull-request-url != ''
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
          PR_URL: ${{ steps.create_pr.outputs.pull-request-url }}
        run: node scripts/slack-approve.js --post

      - name: Commit pending-approval.json to main
        if: steps.create_pr.outputs.pull-request-url != ''
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add scripts/pending-approval.json scripts/topic-queue.json
          git commit -m "chore: track pending approval for \"${{ steps.post_info.outputs.title }}\""
          git push origin main

      - name: No new topics
        if: steps.create_pr.outputs.pull-request-url == ''
        run: echo "Queue empty or all topics published. Add more to scripts/topic-queue.json."
